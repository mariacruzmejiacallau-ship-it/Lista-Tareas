<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Raul | Desarrollo Web</title>

    <meta name="description" content="Portafolio y proyectos de desarrollo web.">
    <meta name="author" content="Raul">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="hero">

        <h1 class="main-title">
            Construyendo experiencias digitales modernas.
        </h1>

        <section class="hero-image">
            <img src="img/Goku.jpg" alt="Imagen principal del proyecto" class="image_class">
        </section>

        <section class="hero-content">

            <span class="hero-tag">
                DESARROLLADOR WEB
            </span>

            <p>
                Aprendiendo y desarrollando proyectos desde cero,
                explorando diseño, programación y tecnología.
            </p>

            <div class="hero-buttons">
                <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer" class="btn-primary">
                    Explorar
                </a>
                <a href="#proyectos" class="btn-secondary">
                    Ver proyectos
                </a>
            </div>

            <div class="todo-app">
                <h2>Lista de Tareas</h2>
                <div class="todo-input-group">
                    <input type="text" id="input_tareas" placeholder="Agregar nueva tarea">
                    <button id="BottonAgregar">+</button>
                </div>
                <ul id="ListaTareas">
                    
                </ul>
            </div>

        </section>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
